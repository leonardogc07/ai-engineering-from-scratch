<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 11px; fill: #555; font-style: italic; }
      .title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
      .tag { font-size: 10px; fill: #c0392b; font-weight: 600; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">Whisper — attention encoder-decoder, 30-second input, forced special tokens</text>

  <rect x="20" y="50" width="150" height="100" class="box"/>
  <text x="95" y="74" text-anchor="middle" class="label">1. 16 kHz mono</text>
  <text x="95" y="94" text-anchor="middle" class="content">pad/trim to 30 s</text>
  <text x="95" y="112" text-anchor="middle" class="content">480,000 samples</text>
  <text x="95" y="134" text-anchor="middle" class="caption">lose &gt; 30 s → chunk</text>

  <line x1="172" y1="100" x2="193" y2="100" class="content" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="195" y="50" width="150" height="100" class="box"/>
  <text x="270" y="74" text-anchor="middle" class="label">2. log-mel</text>
  <text x="270" y="94" text-anchor="middle" class="content">80 mels · 25 ms · 10 ms</text>
  <text x="270" y="112" text-anchor="middle" class="content">(3000, 80) per utt</text>
  <text x="270" y="134" text-anchor="middle" class="caption">clamp + normalize</text>

  <line x1="347" y1="100" x2="368" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="370" y="50" width="170" height="100" class="box"/>
  <text x="455" y="74" text-anchor="middle" class="label">3. encoder (32 layers)</text>
  <text x="455" y="94" text-anchor="middle" class="content">conv stride-2 stem</text>
  <text x="455" y="112" text-anchor="middle" class="content">→ (1500, d_model)</text>
  <text x="455" y="134" text-anchor="middle" class="caption">d_model = 1280 (large)</text>

  <line x1="542" y1="100" x2="563" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="565" y="50" width="170" height="100" class="hot"/>
  <text x="650" y="74" text-anchor="middle" class="label">4. decoder (cross-attn)</text>
  <text x="650" y="94" text-anchor="middle" class="content">large-v3: 32 layers</text>
  <text x="650" y="112" text-anchor="middle" class="content">turbo: 4 layers  →  5.4×</text>
  <text x="650" y="134" text-anchor="middle" class="caption">autoregressive BPE decode</text>

  <line x1="737" y1="100" x2="758" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="760" y="50" width="100" height="100" class="box"/>
  <text x="810" y="74" text-anchor="middle" class="label">5. text</text>
  <text x="810" y="96" text-anchor="middle" class="content">UTF-8</text>
  <text x="810" y="114" text-anchor="middle" class="content">+ timestamps</text>
  <text x="810" y="136" text-anchor="middle" class="caption">(optional)</text>

  <rect x="20" y="180" width="840" height="108" class="box"/>
  <text x="440" y="202" text-anchor="middle" class="label">special tokens the decoder MUST see (force them)</text>
  <text x="40" y="228" class="content">&lt;|startoftranscript|&gt;   &lt;|en|&gt;   &lt;|transcribe|&gt;   &lt;|notimestamps|&gt;   …actual tokens…   &lt;|endoftext|&gt;</text>
  <text x="40" y="250" class="caption">skip these and Whisper auto-detects language (wrong on noisy clips) or emits timestamp tokens you did not want</text>
  <text x="40" y="272" class="caption">turbo decoder was NOT trained on &lt;|translate|&gt; — use large-v3 for translate-to-English</text>

  <rect x="20" y="308" width="840" height="120" class="box"/>
  <text x="440" y="330" text-anchor="middle" class="label">2026 variants on LibriSpeech test-clean</text>
  <text x="40" y="356" class="content">whisper-tiny           39M    5.7%   edge / mobile</text>
  <text x="40" y="374" class="content">whisper-small         244M    3.4%   laptop</text>
  <text x="40" y="392" class="content">whisper-large-v3     1550M    2.0%   full, 32-layer decoder</text>
  <text x="40" y="410" class="content">whisper-large-v3-turbo 809M   2.0%   4-layer decoder · DEFAULT 2026</text>
</svg>
